<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRZ Symmetry Web (Prototype)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>BRZ Symmetry Web</h1>
      <p class="sub">Prototype: client-side upload/process/download on GitHub Pages.</p>
      <p class="hint">Paste with Ctrl+V after copying a build in Brickadia.</p>

      <label class="field">
        <span>Input .brz</span>
        <input id="fileInput" type="file" accept=".brz" />
      </label>

      <label class="field">
        <span>Axis</span>
        <select id="axisSelect">
          <option value="x">X</option>
          <option value="y">Y</option>
          <option value="z">Z</option>
        </select>
      </label>

      <div class="actions">
        <button id="validateBtn" disabled>Validate</button>
        <button id="processBtn" disabled>Process + Download</button>
        <button id="copyOutputBtn" disabled>Copy Output</button>
      </div>

      <pre id="status" class="status">Paste with Ctrl+V, or select a BRZ file.</pre>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
